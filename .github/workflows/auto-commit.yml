name: Auto Commit

on:
  schedule:
    # 工作日（周一到周五）多时段触发，模拟真实开发节奏
    # UTC 时间 → 北京时间 (+8)
    - cron: '0 1 * * 1-5'    # 09:00 BJT
    - cron: '30 3 * * 1-5'   # 11:30 BJT
    - cron: '0 6 * * 1-5'    # 14:00 BJT
    - cron: '0 9 * * 1-5'    # 17:00 BJT
    - cron: '0 12 * * 1-5'   # 20:00 BJT
    # 周末低频（北京时间 12:00）
    - cron: '0 4 * * 0,6'

  # 手动触发，可指定提交数量
  workflow_dispatch:
    inputs:
      commit_count:
        description: '生成提交数量 (1-5)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5']

concurrency:
  group: auto-commit
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # 必须用 PAT，GITHUB_TOKEN 的提交不计入个人贡献图
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name  "${{ vars.GIT_AUTHOR_NAME }}"
          git config user.email "${{ vars.GIT_AUTHOR_EMAIL }}"

      - name: Generate and commit
        env:
          COMMIT_COUNT: ${{ github.event.inputs.commit_count || '1' }}
        run: python scripts/generate.py

      - name: Push
        run: git push origin HEAD
